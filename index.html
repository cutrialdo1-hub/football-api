<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GAFFER | Tactical HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #050608; color: #fff; }
        .neon-border { border: 1px solid #CCFF00; box-shadow: 0 0 10px rgba(204, 255, 0, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 border-b border-zinc-800 pb-4">
            <h1 class="text-4xl font-black italic text-[#CCFF00]">THE GAFFER <span class="text-white text-sm not-italic ml-2">v1.0</span></h1>
        </header>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-zinc-500 mb-1">COMPETITION CODE (e.g., PL, PD, SA)</label>
                    <input id="league" type="text" value="PL" class="w-full bg-zinc-900 border border-zinc-700 p-3 outline-none focus:border-[#CCFF00]">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input id="home_id" type="number" placeholder="Home Team ID" class="bg-zinc-900 border border-zinc-700 p-3">
                    <input id="away_id" type="number" placeholder="Away Team ID" class="bg-zinc-900 border border-zinc-700 p-3">
                </div>
                <button onclick="runPrediction()" class="w-full bg-[#CCFF00] text-black font-black p-4 hover:bg-white transition-all">RUN TACTICAL ANALYSIS</button>
            </div>

            <div id="results" class="hidden neon-border p-6 bg-zinc-900/50">
                <div class="flex justify-between items-center mb-6">
                    <div class="text-center">
                        <p id="h_name" class="text-xs text-zinc-400"></p>
                        <p id="h_prob" class="text-3xl font-bold"></p>
                    </div>
                    <div class="text-zinc-600 font-bold">VS</div>
                    <div class="text-center">
                        <p id="a_name" class="text-xs text-zinc-400"></p>
                        <p id="a_prob" class="text-3xl font-bold"></p>
                    </div>
                </div>
                <div class="border-t border-zinc-800 pt-4">
                    <p class="text-[#CCFF00] text-xs font-bold mb-2">MANAGER'S VERDICT:</p>
                    <p id="verdict_text" class="italic text-zinc-300"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runPrediction() {
            const data = {
                league: document.getElementById('league').value,
                home_id: document.getElementById('home_id').value,
                away_id: document.getElementById('away_id').value
            };
            
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('h_name').innerText = result.home_name;
            document.getElementById('a_name').innerText = result.away_name;
            document.getElementById('h_prob').innerText = result.probs.home;
            document.getElementById('a_prob').innerText = result.probs.away;
            document.getElementById('verdict_text').innerText = result.verdict;
        }
    </script>
</body>
</html>
