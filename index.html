<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GAFFER | Tactical Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon:#00ff9d; --bg:#0a0b10; --card:#151821; --border:#2a2d3a; --away:#ff3366; --draw:#8892b0; }
        body { background:var(--bg); color:#fff; font-family:Inter,sans-serif; display:flex; justify-content:center; padding:20px; }
        .container { width:100%; max-width:480px; }
        h1 { font-family:Orbitron; color:var(--neon); text-align:center; letter-spacing:5px; font-size:1.2rem; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:20px; }
        input, select, button { width:100%; padding:14px; margin-bottom:12px; border-radius:10px; background:#000; border:1px solid var(--border); color:#fff; box-sizing:border-box; }
        button { background:var(--neon); color:#000; font-weight:800; font-family:Orbitron; cursor:pointer; border:none; }
        .score { font-family:Orbitron; font-size:4rem; text-align:center; color:var(--neon); margin:10px 0; }
        .prob-bar { display:flex; height:24px; border-radius:6px; overflow:hidden; margin:15px 0; font-family:Orbitron; font-size:0.7rem; line-height:24px; text-align:center; }
        .p-h { background:var(--neon); color:#000; } .p-d { background:var(--draw); color:#000; } .p-a { background:var(--away); color:#000; }
        .gaffer-box { background:rgba(0,255,157,0.05); border-left:4px solid var(--neon); padding:15px; margin-top:15px; font-style:italic; font-size:0.9rem; }
        .odds-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .odds-grid input { margin-bottom: 0; padding: 10px; font-size: 0.8rem; }
        .pill { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; font-family: Orbitron; border: 1px solid var(--neon); color: var(--neon); margin-bottom: 10px; animation: glow 1.5s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--neon); } 50% { box-shadow: 0 0 15px var(--neon); } 100% { box-shadow: 0 0 5px var(--neon); } }
        .extra-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .extra-item { background: #000; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>
<div class="container">
    <h1>THE GAFFER</h1>
    <div class="card">
        <input type="date" id="date" onchange="getFixtures()">
        <select id="matches" onchange="setupMatch()"><option value="">Select Match...</option></select>
    </div>
    <div id="output"></div>
</div>

<script>
const API = "https://football-api-9e4p.onrender.com";
let fixturesData = [];
let selectedIdx = null;

async function getFixtures() {
    const d = document.getElementById("date").value;
    const s = document.getElementById("matches");
    if(!d) return;
    s.innerHTML = "<option>Scanning...</option>";
    try {
        const res = await fetch(`${API}/fixtures?date=${d}`);
        const data = await res.json();
        fixturesData = data;
        s.innerHTML = data.length ? "<option value=''>Select Match</option>" : "<option>No Games Found</option>";
        data.forEach((m, i) => s.innerHTML += `<option value="${i}">[${m.comp}] ${m.home} vs ${m.away}</option>`);
    } catch (e) { s.innerHTML = "<option>Error</option>"; }
}

function setupMatch() {
    selectedIdx = document.getElementById("matches").value;
    if(selectedIdx === "") return;
    const m = fixturesData[selectedIdx];
    document.getElementById("output").innerHTML = `
        <div class="card">
            <h3 style="font-family:Orbitron; font-size:0.8rem; color:var(--neon); margin-top:0;">PRE-CHECK: ${m.home} vs ${m.away}</h3>
            <label style="font-size:0.6rem; opacity:0.6; display:block; margin-bottom:5px;">OPTIONAL: BOOKIE ODDS (DECIMAL)</label>
            <div class="odds-grid">
                <input type="number" id="oH" placeholder="Home">
                <input type="number" id="oD" placeholder="Draw">
                <input type="number" id="oA" placeholder="Away">
            </div>
            <button onclick="predict()">RUN VERDICT ENGINE</button>
        </div>`;
}

async function predict() {
    const out = document.getElementById("output");
    const odds = {
        home: parseFloat(document.getElementById("oH").value) || 0,
        draw: parseFloat(document.getElementById("oD").value) || 0,
        away: parseFloat(document.getElementById("oA").value) || 0
    };
    out.innerHTML = "<div class='card' style='text-align:center;'>Calculating Probabilities...</div>";
    try {
        const res = await fetch(`${API}/predict`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({...fixturesData[selectedIdx], bookie_odds: odds})
        });
        const d = await res.json();
        let alerts = "";
        for(let k in d.value_alerts) if(d.value_alerts[k].value_edge) alerts += `<div class="pill">✦ ${k.toUpperCase()} EDGE +${d.value_alerts[k].edge}%</div>`;

        out.innerHTML = `
        <div class="card">
            ${alerts}
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; opacity:0.7;">
                <span><b>${fixturesData[selectedIdx].home}</b> (Rank: ${d.h_rank})</span>
                <span><b>${fixturesData[selectedIdx].away}</b> (Rank: ${d.a_rank})</span>
            </div>
            <div class="score">${d.score}</div>
            <div class="prob-bar">
                <div class="p-h" style="width:${d.probs.home}%">${d.probs.home}%</div>
                <div class="p-d" style="width:${d.probs.draw}%">${d.probs.draw}%</div>
                <div class="p-a" style="width:${d.probs.away}%">${d.probs.away}%</div>
            </div>
            <div class="extra-grid">
                <div class="extra-item"><small>BTTS YES</small><br><b>${d.market.btts}%</b></div>
                <div class="extra-item"><small>OVER 2.5</small><br><b>${d.market.over25}%</b></div>
            </div>
            <div class="gaffer-box"><b>THE GAFFER:</b> Result favors <b>${d.score}</b> scoreline.</div>
            <button style="margin-top:20px; background:none; border:1px solid var(--border); color:var(--draw); font-size:0.6rem;" onclick="setupMatch()">NEW ANALYSIS</button>
        </div>`;
    } catch (e) { out.innerHTML = "Error."; }
}
</script>
</body>
</html>
