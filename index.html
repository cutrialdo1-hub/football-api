<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GAFFER | HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #050608; color: #fff; }
        .neon-text { color: #CCFF00; }
        .neon-border { border: 1px solid #CCFF00; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-xl mx-auto">
        <h1 class="text-4xl font-black italic neon-text mb-8">THE GAFFER</h1>

        <div class="mb-6">
            <label class="block text-[10px] text-zinc-500 mb-2 tracking-widest">SELECT FIXTURE</label>
            <select id="matchSelect" class="w-full bg-zinc-900 border border-zinc-700 p-4 outline-none focus:border-[#CCFF00] text-sm">
                <option>Scanning airwaves...</option>
            </select>
        </div>

        <button onclick="runPrediction()" class="w-full bg-[#CCFF00] text-black font-black p-4 uppercase hover:bg-white transition-all mb-8">Run Analysis</button>

        <div id="results" class="hidden neon-border p-6 bg-zinc-900/50">
            <div class="flex justify-between items-center mb-6 text-center">
                <div class="w-1/3"><p id="h_name" class="text-xs text-zinc-400"></p><p id="h_prob" class="text-4xl font-bold"></p></div>
                <div class="text-zinc-700 font-bold italic">VS</div>
                <div class="w-1/3"><p id="a_name" class="text-xs text-zinc-400"></p><p id="a_prob" class="text-4xl font-bold"></p></div>
            </div>
            <div class="border-t border-zinc-800 pt-4">
                <p class="neon-text text-[10px] font-bold mb-1">THE GAFFER'S VERDICT:</p>
                <p id="verdict_text" class="italic text-zinc-300 text-sm"></p>
            </div>
        </div>
    </div>

    <script>
        async function loadMatches() {
            const res = await fetch('/get_matches');
            const matches = await res.json();
            const select = document.getElementById('matchSelect');
            select.innerHTML = matches.map(m => `<option value='${JSON.stringify(m)}'>${m.date} | ${m.league}: ${m.home} v ${m.away}</option>`).join('');
        }

        async function runPrediction() {
            const matchData = JSON.parse(document.getElementById('matchSelect').value);
            document.getElementById('results').classList.remove('hidden');
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(matchData)
            });
            const result = await response.json();
            document.getElementById('h_name').innerText = result.home_name;
            document.getElementById('a_name').innerText = result.away_name;
            document.getElementById('h_prob').innerText = result.probs.home;
            document.getElementById('a_prob').innerText = result.probs.away;
            document.getElementById('verdict_text').innerText = result.verdict;
        }
        window.onload = loadMatches;
    </script>
</body>
</html>
