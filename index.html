<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GAFFER | Tactical Analyst</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff9d; --bg: #050505; --card: #12141c; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; }
        h1 { font-family: 'Orbitron'; color: var(--accent); text-align: center; letter-spacing: 4px; margin-bottom: 30px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        select, input, button { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 15px; }
        button { background: var(--accent); color: #000; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; border: none; }
        .league-label { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }
        .score-hero { font-family: 'Orbitron'; font-size: 5rem; text-align: center; margin: 20px 0; color: #fff; }
        .rank-badge { background: #1a1d29; padding: 10px; border-radius: 8px; font-size: 0.8rem; text-align: center; }
        .gaffer-quote { border-left: 4px solid var(--accent); padding: 15px; background: rgba(255,255,255,0.03); font-style: italic; font-size: 0.95rem; line-height: 1.6; color: #ddd; }
        optgroup { background: #000; color: var(--accent); font-family: 'Orbitron'; }
    </style>
</head>
<body>
<div class="container">
    <h1>THE GAFFER</h1>
    <div class="card">
        <input type="date" id="match_date">
        <button onclick="loadFixtures()">LOAD FIXTURES</button>
    </div>
    <div class="card">
        <select id="fixture_select"><option>Waiting for Date...</option></select>
        <button onclick="runAnalysis()">RUN ANALYTICS</button>
    </div>
    <div id="output"></div>
</div>

<script>
    const API = "https://football-api-9e4p.onrender.com";
    let gameMap = {};

    async function loadFixtures() {
        const d = document.getElementById('match_date').value;
        const res = await fetch(`${API}/fixtures?date=${d}`);
        const data = await res.json();
        const sel = document.getElementById('fixture_select');
        sel.innerHTML = "";
        
        for (const [league, games] of Object.entries(data)) {
            const group = document.createElement('optgroup');
            group.label = league;
            games.forEach(g => {
                const opt = document.createElement('option');
                opt.value = JSON.stringify(g);
                opt.textContent = `${g.home} vs ${g.away}`;
                group.appendChild(opt);
            });
            sel.appendChild(group);
        }
    }

    async function runAnalysis() {
        const val = document.getElementById('fixture_select').value;
        const out = document.getElementById('output');
        out.innerHTML = "<div class='card'>Scouting the opposition...</div>";
        
        const res = await fetch(`${API}/predict`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: val
        });
        const d = await res.json();
        const match = JSON.parse(val);

        out.innerHTML = `
            <div class="card">
                <div style="display:flex; justify-content:space-between">
                    <div class="rank-badge">${match.home}<br><b>Pos: ${d.h_rank}</b></div>
                    <div class="rank-badge">${match.away}<br><b>Pos: ${d.a_rank}</b></div>
                </div>
                <div class="score-hero">${d.score}</div>
                <div class="gaffer-quote">${d.insight}</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px">
                    <div class="rank-badge">Home Form (Last 5)<br><b style="color:var(--accent)">${d.h_form} Pts</b></div>
                    <div class="rank-badge">Away Form (Last 5)<br><b style="color:var(--accent)">${d.a_form} Pts</b></div>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
