<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Predictor Pro</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; margin: 15px auto; max-width: 400px; border-radius: 12px; }
        select, input, button { padding: 12px; margin: 8px; width: 100%; max-width: 300px; border-radius: 8px; border: none; }
        button { background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #16a34a; }
        .prob-bar { background: #334155; height: 20px; border-radius: 10px; margin: 15px 0; overflow: hidden; display: flex; }
        .h-fill { background: #3b82f6; height: 100%; }
        .d-fill { background: #94a3b8; height: 100%; }
        .a-fill { background: #ef4444; height: 100%; }
    </style>
</head>
<body>

    <h1>⚽ Poisson Match Predictor</h1>

    <div class="card">
        <input type="date" id="date">
        <button onclick="loadMatches()">Load Fixtures</button>
    </div>

    <div class="card">
        <select id="matches">
            <option value="">Select a date first</option>
        </select>
        <button onclick="predict()">Calculate Probability</button>
    </div>

    <div id="output"></div>

    <script>
        // REPLACE WITH YOUR ACTUAL RENDER URL
        const API = "https://football-api-9e4p.onrender.com"; 
        let matchesData = [];

        async function loadMatches() {
            const date = document.getElementById("date").value;
            const select = document.getElementById("matches");
            if (!date) return alert("Select a date");

            select.innerHTML = "<option>Loading...</option>";
            
            try {
                const res = await fetch(`${API}/fixtures?date=${date}`);
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);

                matchesData = data;
                select.innerHTML = "<option value=''>-- Select Match --</option>";
                
                matchesData.forEach((m, i) => {
                    const opt = document.createElement("option");
                    opt.value = i;
                    opt.textContent = `[${m.competition}] ${m.home} vs ${m.away}`;
                    select.appendChild(opt);
                });
            } catch (e) {
                select.innerHTML = "<option>Error loading fixtures</option>";
                console.error(e);
            }
        }

        async function predict() {
            const idx = document.getElementById("matches").value;
            const out = document.getElementById("output");
            if (idx === "") return;

            const m = matchesData[idx];
            out.innerHTML = "<div class='card'>Simulating...</div>";

            try {
                const res = await fetch(`${API}/predict`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        home_id: m.home_id,
                        away_id: m.away_id,
                        competition: m.competition
                    })
                });
                const d = await res.json();

                out.innerHTML = `
                    <div class="card">
                        <h3>${m.home} vs ${m.away}</h3>
                        <p>Expected Goals: ${d.home_xg} - ${d.away_xg}</p>
                        <div class="prob-bar">
                            <div class="h-fill" style="width:${d.probabilities.home}%"></div>
                            <div class="d-fill" style="width:${d.probabilities.draw}%"></div>
                            <div class="a-fill" style="width:${d.probabilities.away}%"></div>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:0.8em">
                            <span>Win: ${d.probabilities.home}%</span>
                            <span>Draw: ${d.probabilities.draw}%</span>
                            <span>Loss: ${d.probabilities.away}%</span>
                        </div>
                    </div>
                `;
            } catch (e) {
                out.innerHTML = "<div class='card'>Error calculating prediction</div>";
            }
        }
    </script>
</body>
</html>
