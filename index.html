<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Football Predictor Pro</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; text-align: center; }
        .card { background: #1e293b; padding: 20px; margin: 15px 0; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        button { background: #22c55e; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; box-sizing: border-box; }
        
        .score-badge { font-size: 2.5em; font-weight: 800; color: #22c55e; margin: 10px 0; letter-spacing: 2px; }
        .analysis-box { background: #334155; padding: 15px; border-radius: 10px; font-style: italic; font-size: 0.95em; line-height: 1.5; color: #cbd5e1; border-left: 4px solid #22c55e; text-align: left; }
        
        .bar-container { background: #334155; height: 12px; border-radius: 6px; display: flex; overflow: hidden; margin: 15px 0; }
        .h-f { background: #3b82f6; } .d-f { background: #94a3b8; } .a-f { background: #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ AI Predictor</h1>

    <div class="card">
        <input type="date" id="date">
        <button onclick="loadMatches()">Load Fixtures</button>
    </div>

    <div class="card">
        <select id="matches"><option>Select Date First</option></select>
        <button onclick="predict()">Generate AI Analysis</button>
    </div>

    <div id="output"></div>
</div>

<script>
    const API = "https://football-api-9e4p.onrender.com";
    let matchesData = [];

    async function loadMatches() {
        const date = document.getElementById("date").value;
        const select = document.getElementById("matches");
        if(!date) return;
        select.innerHTML = "<option>Loading...</option>";
        const res = await fetch(`${API}/fixtures?date=${date}`);
        matchesData = await res.json();
        select.innerHTML = matchesData.length ? "<option value=''>-- Select Match --</option>" : "<option>No Matches Found</option>";
        matchesData.forEach((m, i) => {
            let opt = document.createElement("option");
            opt.value = i;
            opt.textContent = `${m.home} vs ${m.away}`;
            select.appendChild(opt);
        });
    }

    async function predict() {
        const idx = document.getElementById("matches").value;
        const out = document.getElementById("output");
        if(idx === "") return;
        const m = matchesData[idx];
        out.innerHTML = "<div class='card'>AI is analyzing team strengths...</div>";

        const res = await fetch(`${API}/predict`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({home_id: m.home_id, away_id: m.away_id, competition: m.competition})
        });
        const d = await res.json();

        out.innerHTML = `
            <div class="card">
                <h3 style="margin-top:0">${m.home} vs ${m.away}</h3>
                <div style="font-size:0.8em; color:#94a3b8">PREDICTED SCORE</div>
                <div class="score-badge">${d.prediction}</div>
                
                <div class="bar-container">
                    <div class="h-f" style="width:${d.probs.home}%"></div>
                    <div class="d-f" style="width:${d.probs.draw}%"></div>
                    <div class="a-f" style="width:${d.probs.away}%"></div>
                </div>
                
                <div style="display:flex; justify-content:space-between; font-size:0.85em; margin-bottom:15px">
                    <span>Win: ${d.probs.home}%</span>
                    <span>Draw: ${d.probs.draw}%</span>
                    <span>Away: ${d.probs.away}%</span>
                </div>

                <div class="analysis-box">
                    <strong>AI Insight:</strong><br>
                    ${d.analysis}
                </div>
                
                <p style="font-size:0.7em; color:#64748b; margin-top:15px">xG Projection: ${d.xg.home} - ${d.xg.away}</p>
            </div>
        `;
    }
</script>

</body>
</html>
