<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GAFFER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon:#00ff9d; --bg:#0a0b10; --card:#151821; --border:#2a2d3a; --away:#ff3366; --draw:#8892b0; }
        body { background:var(--bg); color:#fff; font-family:Inter; display:flex; justify-content:center; padding:20px; }
        .container { width:100%; max-width:480px; }
        h1 { font-family:Orbitron; color:var(--neon); text-align:center; letter-spacing: 5px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:15px; }
        input,select,button { width:100%; padding:12px; margin-top:10px; border-radius:10px; border:1px solid var(--border); background:#000; color:#fff; outline:none; }
        button { background:var(--neon); color:#000; font-weight:bold; cursor:pointer; font-family: Orbitron; border:none; }
        button:disabled { background:#222; color:#555; cursor:not-allowed; }
        .score { font-size:4rem; font-family:Orbitron; text-align:center; margin: 10px 0; }
        .prob-bar { display:flex; height:15px; border-radius:5px; overflow:hidden; margin-top:15px; background:#000; }
        .prob-h { background:var(--neon); height: 100%; }
        .prob-d { background:var(--draw); height: 100%; }
        .prob-a { background:var(--away); height: 100%; }
        .gaffer-box { margin-top:15px; font-size:0.9rem; color:#cbd5e1; border-left: 3px solid var(--neon); padding-left: 10px; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <h1>THE GAFFER</h1>
    <div class="card">
        <input type="date" id="m_date">
        <button onclick="getFixtures()">SCAN FIXTURES</button>
    </div>
    <div class="card">
        <select id="m_list" onchange="checkSelection()">
            <option value="">Select match</option>
        </select>
        <button id="predict_btn" onclick="predict()" disabled>GET VERDICT</button>
    </div>
    <div id="output"></div>
</div>

<script>
    // Update this to your actual Render URL
    const API = "https://football-api-9e4p.onrender.com"; 
    let matches = [];

    function checkSelection() {
        document.getElementById("predict_btn").disabled = document.getElementById("m_list").value === "";
    }

    async function getFixtures() {
        const d = document.getElementById("m_date").value;
        if (!d) return;
        const sel = document.getElementById("m_list");
        sel.innerHTML = "<option>Loading...</option>";
        try {
            const res = await fetch(`${API}/fixtures?date=${d}`);
            matches = await res.json();
            sel.innerHTML = "<option value=''>Select match</option>";
            matches.forEach((m, i) => {
                sel.innerHTML += `<option value="${i}">${m.home} vs ${m.away}</option>`;
            });
        } catch(e) { sel.innerHTML = "<option>Error loading fixtures</option>"; }
    }

    async function predict() {
        const idx = document.getElementById("m_list").value;
        const out = document.getElementById("output");
        
        // Use backticks (`) for multi-line HTML strings
        out.innerHTML = `<div class="card" style="text-align:center">Analyzing tactics...</div>`;

        try {
            const res = await fetch(`${API}/predict`, {
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                body: JSON.stringify(matches[idx])
            });
            const d = await res.json();

            if (d.error) {
                out.innerHTML = `<div class="card">Error: ${d.error}</div>`;
                return;
            }

            out.innerHTML = `
            <div class="card">
                <div style="text-align:center; font-family:Orbitron; margin-bottom:10px; color:var(--draw)">VERDICT</div>
                <div class="score">${d.score}</div>
                <div class="prob-bar">
                    <div class="prob-h" style="width:${d.probs.home}%"></div>
                    <div class="prob-d" style="width:${d.probs.draw}%"></div>
                    <div class="prob-a" style="width:${d.probs.away}%"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-top:5px; font-family:Orbitron">
                    <span style="color:var(--neon)">H: ${d.probs.home}%</span>
                    <span style="color:var(--draw)">D: ${d.probs.draw}%</span>
                    <span style="color:var(--away)">A: ${d.probs.away}%</span>
                </div>
                <div class="gaffer-box">
                    <strong style="color:var(--neon)">GAFFER NOTES:</strong><br>
                    ${d.insight}
                </div>
            </div>`;
        } catch (err) { 
            out.innerHTML = `<div class="card">Server offline or API limit reached.</div>`; 
        }
    }
</script>
</body>
</html>
