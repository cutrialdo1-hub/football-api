<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Football Scout Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card); padding: 20px; margin-bottom: 20px; border-radius: 15px; border: 1px solid #334155; text-align: center; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .score { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 10px 0; }
        .analysis { background: #0f172a; padding: 15px; border-radius: 10px; text-align: left; font-size: 0.9rem; line-height: 1.5; border-left: 4px solid var(--accent); }
        .bar { height: 12px; border-radius: 6px; display: flex; overflow: hidden; margin: 15px 0; background: #334155; }
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .m-card { background: #0f172a; padding: 10px; border-radius: 8px; font-size: 0.75rem; color: #94a3b8; }
        select, input { width: 100%; padding: 10px; border-radius: 8px; background: #0f172a; border: 1px solid #334155; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>AI Scout Pro</h1>
    <div class="card">
        <input type="date" id="date">
        <button onclick="loadMatches()">Load Fixtures</button>
    </div>
    <div class="card">
        <select id="matches"><option>Select Date First</option></select>
        <button onclick="predict()">Run Prediction</button>
    </div>
    <div id="output"></div>
</div>

<script>
    const API = "https://football-api-9e4p.onrender.com";
    let matches = [];

    async function loadMatches() {
        const d = document.getElementById("date").value;
        if(!d) return;
        const res = await fetch(`${API}/fixtures?date=${d}`);
        matches = await res.json();
        const s = document.getElementById("matches");
        s.innerHTML = matches.length ? "<option value=''>-- Select Match --</option>" : "<option>No Games</option>";
        matches.forEach((m, i) => s.innerHTML += `<option value="${i}">${m.home} vs ${m.away}</option>`);
    }

    async function predict() {
        const i = document.getElementById("matches").value;
        if(i === "") return;
        document.getElementById("output").innerHTML = "<div class='card'>Analyzing Venue Stats...</div>";
        
        const res = await fetch(`${API}/predict`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(matches[i])
        });
        const d = await res.json();

        // FIX: Using Optional Chaining ?. to prevent "h_atk undefined" errors
        document.getElementById("output").innerHTML = `
            <div class="card">
                <h3>${matches[i].home} vs ${matches[i].away}</h3>
                <div class="score">${d.prediction}</div>
                <div class="bar">
                    <div style="width:${d.probs.home}%; background:#3b82f6"></div>
                    <div style="width:${d.probs.draw}%; background:#94a3b8"></div>
                    <div style="width:${d.probs.away}%; background:#ef4444"></div>
                </div>
                <div class="analysis"><strong>Insight:</strong> ${d.analysis}</div>
                <div class="metrics">
                    <div class="m-card">H-Atk Strength<br><b>${d.venue_metrics?.h_atk || '1.0'}</b></div>
                    <div class="m-card">A-Def Strength<br><b>${d.venue_metrics?.a_def || '1.0'}</b></div>
                </div>
                <p style="font-size:0.7rem; color:#64748b; margin-top:10px">xG Projection: ${d.xg?.home} - ${d.xg?.away}</p>
            </div>
        `;
    }
</script>
</body>
</html>
