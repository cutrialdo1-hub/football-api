<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE GAFFER</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root { --neon:#00ff9d; --bg:#0a0b10; --card:#151821; --border:#2a2d3a; --away:#ff3366; --draw:#8892b0; }

body {
    background:var(--bg);
    color:#fff;
    font-family:Inter;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container { width:100%; max-width:480px; }

h1 {
    font-family:Orbitron;
    color:var(--neon);
    text-align:center;
}

.card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    margin-bottom:15px;
}

input,select,button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#000;
    color:#fff;
}

button {
    background:var(--neon);
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

.score {
    font-size:3rem;
    font-family:Orbitron;
    text-align:center;
}

.prob-bar {
    display:flex;
    height:25px;
    border-radius:8px;
    overflow:hidden;
    margin-top:10px;
}

.prob-h { background:var(--neon); }
.prob-d { background:var(--draw); }
.prob-a { background:var(--away); }

.gaffer-box {
    margin-top:15px;
    font-size:0.9rem;
    color:#cbd5e1;
}
</style>
</head>

<body>
<div class="container">
    <h1>THE GAFFER</h1>

    <div class="card">
        <input type="date" id="m_date">
        <button onclick="getFixtures()">SCAN FIXTURES</button>
    </div>

    <div class="card">
        <select id="m_list" onchange="checkSelection()">
            <option value="">Select match</option>
        </select>
        <button id="predict_btn" onclick="predict()" disabled>GET VERDICT</button>
    </div>

    <div id="output"></div>
</div>

<script>
const API = "https://football-api-9e4p.onrender.com";
let matches = [];

function checkSelection() {
    document.getElementById("predict_btn").disabled =
        document.getElementById("m_list").value === "";
}

async function getFixtures() {
    const d = document.getElementById("m_date").value;
    if (!d) return;

    const sel = document.getElementById("m_list");
    sel.innerHTML = "<option>Loading...</option>";

    const res = await fetch(`${API}/fixtures?date=${d}`);
    matches = await res.json();

    sel.innerHTML = "<option value=''>Select match</option>";

    matches.forEach((m, i) => {
        sel.innerHTML += `<option value="${i}">
        ${m.home} vs ${m.away}
        </option>`;
    });
}

async function predict() {
    const idx = document.getElementById("m_list").value;
    const out = document.getElementById("output");

    out.innerHTML = "Loading...";

    const res = await fetch(`${API}/predict`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(matches[idx])
    });

    const d = await res.json();

    out.innerHTML = `
    <div class="card">
        <div class="score">${d.score}</div>

        <div class="prob-bar">
            <div style="width:${d.probs.home}%"></div>
            <div style="width:${d.probs.draw}%"></div>
            <div style="width:${d.probs.away}%"></div>
        </div>

        <div class="gaffer-box">${d.insight}</div>
    </div>`;
}
</script>
</body>
</html>
