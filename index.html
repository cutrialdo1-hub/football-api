<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GAFFER | Tactical Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon:#00ff9d; --bg:#0a0b10; --card:#151821; --border:#2a2d3a; --away:#ff3366; --draw:#8892b0; }
        body { background:var(--bg); color:#fff; font-family:Inter,sans-serif; display:flex; justify-content:center; padding:20px; }
        .container { width:100%; max-width:480px; }
        h1 { font-family:Orbitron; color:var(--neon); text-align:center; letter-spacing:5px; font-size:1.2rem; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:20px; }
        input, select, button { width:100%; padding:14px; margin-bottom:12px; border-radius:10px; background:#000; border:1px solid var(--border); color:#fff; box-sizing:border-box; }
        button { background:var(--neon); color:#000; font-weight:800; font-family:Orbitron; cursor:pointer; border:none; transition:0.3s; }
        button:disabled { background:#1a1a1a; color:#444; cursor:not-allowed; }
        .score { font-family:Orbitron; font-size:4rem; text-align:center; color:var(--neon); }
        .prob-bar { display:flex; height:24px; border-radius:6px; overflow:hidden; margin:20px 0; font-family:Orbitron; font-size:0.7rem; line-height:24px; text-align:center; }
        .p-h { background:var(--neon); color:#000; } .p-d { background:var(--draw); color:#000; } .p-a { background:var(--away); color:#000; }
        .dot { width:18px; height:18px; border-radius:4px; font-size:10px; line-height:18px; text-align:center; color:#000; font-weight:bold; display:inline-block; margin-right:2px;}
        .W { background:var(--neon); } .D { background:var(--draw); } .L { background:var(--away); }
        .gaffer-box { background:rgba(0,255,157,0.05); border-left:4px solid var(--neon); padding:15px; margin-top:15px; font-style:italic; font-size:0.85rem; }
        .market-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-top:1px solid #222; }
        .bookie-input { width:60px; padding:5px; margin:0; font-family:Orbitron; font-size:0.7rem; text-align:center; color:var(--neon); }
        .prime { color:var(--neon); font-weight:bold; text-shadow:0 0 5px var(--neon); }
        .loader { border:3px solid #222; border-top:3px solid var(--neon); border-radius:50%; width:30px; height:30px; margin:10px auto; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <h1>THE GAFFER</h1>
    <div class="card">
        <input type="date" id="date">
        <button onclick="getFixtures()">SCAN TACTICAL BOARD</button>
        <select id="matches" onchange="toggleBtn()"><option value="">Select Match...</option></select>
        <button id="btn" onclick="predict()" disabled>GET VERDICT</button>
    </div>
    <div id="output"></div>
</div>

<script>
const API = "https://football-api-9e4p.onrender.com";
let fixturesData = [];

const toggleBtn = () => {
    const s = document.getElementById("matches");
    document.getElementById("btn").disabled = (s.value === "");
};

async function getFixtures() {
    const d = document.getElementById("date").value;
    const s = document.getElementById("matches");
    const out = document.getElementById("output");
    if(!d) return;
    s.innerHTML = "<option>Accessing Satellites...</option>";
    out.innerHTML = "";
    try {
        const res = await fetch(`${API}/fixtures?date=${d}`);
        const data = await res.json();
        fixturesData = data;
        s.innerHTML = fixturesData.length ? "<option value=''>Select Match</option>" : "<option value=''>No Matches</option>";
        fixturesData.forEach((m, i) => s.innerHTML += `<option value="${i}">[${m.comp}] ${m.home} vs ${m.away}</option>`);
    } catch (e) { s.innerHTML = "<option value=''>Offline</option>"; }
}

async function predict() {
    const idx = document.getElementById("matches").value;
    const out = document.getElementById("output");
    if (idx === "") return;
    out.innerHTML = "<div class='loader'></div>";

    try {
        const res = await fetch(`${API}/predict`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(fixturesData[idx])
        });
        const d = await res.json();

        window.calcKelly = (input, fair, targetId) => {
            const val = parseFloat(input.value);
            const target = document.getElementById(targetId);
            if(!val || val <= fair) { target.innerHTML = "--"; return; }
            const edge = (val * (1/fair)) - 1;
            if(edge > 0.05) {
                const k = (((val-1)*(1/fair)) - (1-(1/fair))) / (val-1);
                target.innerHTML = `<span class="prime">VALUE: $${(k * 0.25 * 1000).toFixed(2)}</span>`;
            } else { target.innerHTML = "Thin Edge"; }
        };

        out.innerHTML = `
        <div class="card">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                <div><b>${fixturesData[idx].home}</b><br>Rank: ${d.h_rank}<div>${d.h_form.split('').map(c=>`<div class="dot ${c}">${c}</div>`).join('')}</div></div>
                <div style="text-align:right;"><b>${fixturesData[idx].away}</b><br>Rank: ${d.a_rank}<div>${d.a_form.split('').map(c=>`<div class="dot ${c}">${c}</div>`).join('')}</div></div>
            </div>
            <div class="score">${d.score}</div>
            <div class="prob-bar">
                <div class="p-h" style="width:${d.probs.home}%">${d.probs.home}%</div>
                <div class="p-d" style="width:${d.probs.draw}%">${d.probs.draw}%</div>
                <div class="p-a" style="width:${d.probs.away}%">${d.probs.away}%</div>
            </div>
            <div style="font-size:0.7rem; color:var(--draw); margin-bottom:10px;">MARKET COMPARISON (GAFFER PRICE vs BOOKIE)</div>
            <div class="market-row"><span>HOME WIN (${d.market.home})</span><input type="number" class="bookie-input" placeholder="0.00" oninput="calcKelly(this, ${d.market.home}, 'k-h')"><span id="k-h">--</span></div>
            <div class="market-row"><span>DRAW (${d.market.draw})</span><input type="number" class="bookie-input" placeholder="0.00" oninput="calcKelly(this, ${d.market.draw}, 'k-d')"><span id="k-d">--</span></div>
            <div class="market-row"><span>AWAY WIN (${d.market.away})</span><input type="number" class="bookie-input" placeholder="0.00" oninput="calcKelly(this, ${d.market.away}, 'k-a')"><span id="k-a">--</span></div>
            <div class="gaffer-box">Verdict: <b>${d.score}</b>. Type bookie odds above to check for 1/4 Kelly Stakes.</div>
        </div>`;
    } catch (e) { out.innerHTML = "❌ Connection Error"; }
}
</script>
</body>
</html>
