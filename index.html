<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GAFFER | Tactical Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff9d; --bg: #0a0b10; --card: #151821; --border: #2a2d3a; --away: #ff3366; --draw: #8892b0; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 480px; }
        h1 { font-family: 'Orbitron'; color: var(--neon); text-align: center; letter-spacing: 5px; font-size: 1.2rem; margin-bottom: 30px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        input, select, button { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; margin-bottom: 12px; font-size: 0.9rem; box-sizing: border-box; outline: none; }
        button { background: var(--neon); color: #000; font-weight: 800; font-family: 'Orbitron'; border: none; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }
        .score { font-family: 'Orbitron'; font-size: 4.5rem; color: #fff; margin: 10px 0; }
        .gaffer-box { background: rgba(0,255,157,0.05); padding: 20px; border-radius: 12px; border-left: 4px solid var(--neon); font-style: italic; line-height: 1.6; color: #cbd5e1; position: relative; margin: 20px 0; text-align: left; white-space: pre-line; }
        .gaffer-box::after { content: "— The Gaffer"; display: block; text-align: right; color: var(--neon); font-size: 0.7rem; margin-top: 10px; font-family: 'Orbitron'; }
        .prob-bar { height: 28px; display: flex; background: #000; border-radius: 8px; overflow: hidden; margin: 20px 0; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; line-height: 28px;}
        .prob-h { background: var(--neon); color: #000; transition: width 1s; }
        .prob-d { background: var(--draw); color: #000; transition: width 1s; }
        .prob-a { background: var(--away); color: #000; transition: width 1s; }
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .m-item { background: #0b0d14; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.75rem; color: #8892b0;}
        .m-val { color: #fff; font-weight: bold; font-size: 1rem; display: block; margin-top: 4px;}
        .loader { border: 3px solid #222; border-top: 3px solid var(--neon); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <h1>THE GAFFER</h1>
    <div class="card">
        <input type="date" id="m_date">
        <button onclick="getFixtures()">SCAN FIXTURES</button>
    </div>
    <div class="card">
        <select id="m_list" onchange="checkSelection()"><option value="">Waiting for Scan...</option></select>
        <button id="predict_btn" onclick="predict()" disabled>GET THE VERDICT</button>
    </div>
    <div id="output"></div>
</div>

<script>
    const API = "https://football-api-9e4p.onrender.com"; 
    let matches = [];

    function checkSelection() {
        const sel = document.getElementById('m_list').value;
        document.getElementById('predict_btn').disabled = sel === "";
    }

    async function getFixtures() {
        const d = document.getElementById('m_date').value;
        if(!d) return;
        const sel = document.getElementById('m_list');
        sel.innerHTML = '<option value="">Loading...</option>';
        const res = await fetch(`${API}/fixtures?date=${d}`);
        matches = await res.json();
        sel.innerHTML = matches.length ? '<option value="">-- Select Match --</option>' : '<option value="">No Games Found</option>';
        matches.forEach((m, i) => sel.innerHTML += `<option value="${i}">[${m.league}] ${m.home} vs ${m.away}</option>`);
    }

    async function predict() {
        const idx = document.getElementById('m_list').value;
        const out = document.getElementById('output');
        out.innerHTML = `
            <div class="card">
                <div class="loader"></div>
                <p style="font-family:'Orbitron'; font-size:0.7rem; color:var(--neon); margin-top:10px;">CONSULTING THE GAFFER...</p>
            </div>
        `;

        try {
            const res = await fetch(`${API}/predict`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(matches[idx])
            });
            const d = await res.json();

            out.innerHTML = `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:var(--draw); margin-bottom:15px;">
                        <span style="text-align:left"><b>${matches[idx].home}</b><br>Rank: ${d.h_rank}</span>
                        <span style="text-align:right"><b>${matches[idx].away}</b><br>Rank: ${d.a_rank}</span>
                    </div>
                    <div class="score">${d.score}</div>
                    <div class="prob-bar">
                        <div class="prob-h" style="width:${d.probs.home}%">${d.probs.home}%</div>
                        <div class="prob-d" style="width:${d.probs.draw}%">${d.probs.draw}%</div>
                        <div class="prob-a" style="width:${d.probs.away}%">${d.probs.away}%</div>
                    </div>
                    <div class="gaffer-box">${d.insight}</div>
                    <div class="metrics">
                        <div class="m-item">H. Attack Power<br><span class="m-val" style="color:var(--neon)">${d.metrics.h_atk}</span></div>
                        <div class="m-item">A. Def Vulnerability<br><span class="m-val" style="color:var(--away)">${d.metrics.a_def}</span></div>
                    </div>
                </div>
            `;
        } catch (e) {
            out.innerHTML = '<div class="card">The connection timed out. Wake the Gaffer up and try again!</div>';
        }
    }
</script>
</body>
</html>
