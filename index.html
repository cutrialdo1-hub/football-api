<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE GAFFER | Tactical Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --neon:#00ff9d;
    --bg:#0a0b10;
    --card:#151821;
    --border:#2a2d3a;
    --away:#ff3366;
    --draw:#8892b0;
}

body {
    background: var(--bg);
    color: #fff;
    font-family: Inter, sans-serif;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container { width:100%; max-width:480px; }

h1 {
    font-family: Orbitron;
    color: var(--neon);
    text-align:center;
    letter-spacing:5px;
}

.card {
    background: var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

input, select, button {
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#000;
    color:#fff;
}

button {
    background:var(--neon);
    color:#000;
    font-weight:800;
    font-family:Orbitron;
    cursor:pointer;
}

button:disabled {
    background:#222;
    color:#555;
    cursor:not-allowed;
}

.score {
    font-family:Orbitron;
    font-size:3rem;
    text-align:center;
}

.prob-bar {
    display:flex;
    height:28px;
    margin:20px 0;
    font-family:Orbitron;
}

.prob-h { background:var(--neon); color:#000; }
.prob-d { background:var(--draw); }
.prob-a { background:var(--away); }

.prob-h, .prob-d, .prob-a {
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:0.7rem;
}

.loader {
    border:3px solid #222;
    border-top:3px solid var(--neon);
    border-radius:50%;
    width:30px;
    height:30px;
    animation:spin 1s linear infinite;
    margin:20px auto;
}

@keyframes spin {
    100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h1>THE GAFFER</h1>

    <div class="card">
        <input type="date" id="date">
        <button onclick="getFixtures()">SCAN FIXTURES</button>
    </div>

    <div class="card">
        <select id="matches" onchange="check()">
            <option value="">Waiting...</option>
        </select>

        <button id="btn" onclick="predict()" disabled>GET VERDICT</button>
    </div>

    <div id="output"></div>
</div>

<script>
const API = "https://football-api-9e4p.onrender.com";
let matches = [];

function check(){
    document.getElementById("btn").disabled =
        document.getElementById("matches").value === "";
}

async function getFixtures(){
    const date = document.getElementById("date").value;
    const sel = document.getElementById("matches");

    sel.innerHTML = "<option>Loading...</option>";

    const res = await fetch(`${API}/fixtures?date=${date}`);
    matches = await res.json();

    sel.innerHTML = "<option value=''>Select Match</option>";

    matches.forEach((m,i)=>{
        sel.innerHTML += `<option value="${i}">${m.home} vs ${m.away}</option>`;
    });
}

async function predict(){
    const i = document.getElementById("matches").value;
    const out = document.getElementById("output");

    out.innerHTML = "<div class='loader'></div>";

    const res = await fetch(`${API}/predict`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(matches[i])
    });

    const d = await res.json();

    out.innerHTML = `
    <div class="card">
        <div class="score">${d.score}</div>

        <div class="prob-bar">
            <div class="prob-h" style="width:${d.probs.home}%">${d.probs.home}%</div>
            <div class="prob-d" style="width:${d.probs.draw}%">${d.probs.draw}%</div>
            <div class="prob-a" style="width:${d.probs.away}%">${d.probs.away}%</div>
        </div>

        <p>${d.insight}</p>
    </div>`;
}
</script>

</body>
</html>
