<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Football Scout Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 480px; }
        .card { background: var(--card); padding: 24px; margin-bottom: 20px; border-radius: 16px; border: 1px solid #334155; text-align: center; }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; box-sizing: border-box; }
        button { background: var(--accent); color: white; font-weight: 700; border: none; cursor: pointer; }
        .score-badge { font-size: 3.5rem; font-weight: 900; color: var(--accent); }
        .analysis-box { background: #0f172a; padding: 20px; border-radius: 12px; text-align: left; line-height: 1.6; border-left: 4px solid var(--accent); color: #cbd5e1; font-size: 0.9rem; }
        .bar { height: 12px; border-radius: 6px; display: flex; overflow: hidden; margin: 20px 0; background: #334155; }
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .metric { background: #0f172a; padding: 10px; border-radius: 8px; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1 style="margin-bottom:0">AI Scout <span style="color:var(--accent)">v2.0</span></h1>
        <p style="color:#64748b; margin-top:5px">Venue-Specific Automated Engine</p>
    </header>

    <div class="card">
        <input type="date" id="date">
        <button onclick="loadMatches()">SCAN FIXTURES</button>
    </div>

    <div class="card">
        <select id="matches"><option>Select Date First</option></select>
        <button onclick="predict()">RUN DEEP ANALYSIS</button>
    </div>

    <div id="output"></div>
</div>

<script>
    const API = "https://football-api-9e4p.onrender.com";
    let matchesData = [];

    async function loadMatches() {
        const d = document.getElementById("date").value;
        const s = document.getElementById("matches");
        if(!d) return;
        s.innerHTML = "<option>Fetching...</option>";
        const res = await fetch(`${API}/fixtures?date=${d}`);
        matchesData = await res.json();
        s.innerHTML = matchesData.length ? "<option value=''>-- Select Match --</option>" : "<option>No Games Found</option>";
        matchesData.forEach((m, i) => {
            let opt = document.createElement("option"); opt.value = i;
            opt.textContent = `${m.home} vs ${m.away}`;
            s.appendChild(opt);
        });
    }

    async function predict() {
        const idx = document.getElementById("matches").value;
        const out = document.getElementById("output");
        if(idx === "") return;
        const m = matchesData[idx];
        out.innerHTML = "<div class='card'>Simulating Venue Conditions...</div>";

        const res = await fetch(`${API}/predict`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({home_id: m.home_id, away_id: m.away_id, competition: m.competition})
        });
        const d = await res.json();

        out.innerHTML = `
            <div class="card">
                <div style="font-size:0.7rem; color:#64748b">PROBABLE SCORELINE</div>
                <div class="score-badge">${d.prediction}</div>
                
                <div class="bar">
                    <div style="width:${d.probs.home}%; background:#3b82f6"></div>
                    <div style="width:${d.probs.draw}%; background:#94a3b8"></div>
                    <div style="width:${d.probs.away}%; background:#ef4444"></div>
                </div>

                <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:20px">
                    <span>Home Win: ${d.probs.home}%</span>
                    <span>Away Win: ${d.probs.away}%</span>
                </div>

                <div class="analysis-box">
                    <strong style="color:var(--accent); display:block; font-size:0.7rem; margin-bottom:5px">AI ANALYST INSIGHT</strong>
                    ${d.analysis}
                </div>

                <div class="metrics-grid">
                    <div class="metric">Home Atk Strength: <br><b>${d.venue_metrics.h_atk}</b></div>
                    <div class="metric">Away Def Strength: <br><b>${d.venue_metrics.a_def}</b></div>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
