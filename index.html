<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE GAFFER</title>
    <style>
        :root { --neon:#00ff9d; --bg:#0a0b10; --card:#151821; --border:#2a2d3a; --away:#ff3366; --draw:#8892b0; }
        body { background:var(--bg); color:#fff; font-family: sans-serif; display:flex; justify-content:center; padding:20px; }
        .container { width:100%; max-width:450px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:15px; }
        input, select, button { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid var(--border); background:#000; color:#fff; font-size: 1rem; }
        button { background:var(--neon); color:#000; font-weight:bold; cursor:pointer; border:none; text-transform: uppercase; }
        button:disabled { background:#222; color:#555; }
        .score { font-size:4rem; text-align:center; font-weight: bold; margin: 10px 0; color: #fff; }
        .prob-bar { display:flex; height:14px; border-radius:7px; overflow:hidden; margin-top:15px; background:#222; }
        .prob-h { background:var(--neon); height:100%; }
        .prob-d { background:var(--draw); height:100%; }
        .prob-a { background:var(--away); height:100%; }
        .gaffer-box { margin-top:15px; padding-left:12px; border-left:3px solid var(--neon); color:#cbd5e1; font-style:italic; line-height: 1.4; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="color:var(--neon); text-align:center; letter-spacing:3px;">THE GAFFER</h1>
    <div class="card">
        <input type="date" id="m_date">
        <button onclick="getFixtures()">SCAN FIXTURES</button>
    </div>
    <div class="card">
        <select id="m_list" onchange="document.getElementById('p_btn').disabled=false">
            <option value="">Select match</option>
        </select>
        <button id="p_btn" onclick="predict()" disabled>GET VERDICT</button>
    </div>
    <div id="output"></div>
</div>

<script>
    const API = "https://football-api-9e4p.onrender.com";
    let matches = [];

    async function getFixtures() {
        const d = document.getElementById("m_date").value;
        const sel = document.getElementById("m_list");
        if(!d) return;
        sel.innerHTML = "<option>Scanning...</option>";
        try {
            const res = await fetch(`${API}/fixtures?date=${d}`);
            matches = await res.json();
            if(matches.length === 0) {
                sel.innerHTML = "<option>No major games found</option>";
            } else {
                sel.innerHTML = "<option value=''>-- Choose Match --</option>";
                matches.forEach((m, i) => {
                    sel.innerHTML += `<option value="${i}">${m.home} vs ${m.away}</option>`;
                });
            }
        } catch(e) { sel.innerHTML = "<option>Server waking up... Try again</option>"; }
    }

    async function predict() {
        const idx = document.getElementById("m_list").value;
        const out = document.getElementById("output");
        out.innerHTML = "<div class='card' style='text-align:center'>Consulting the tactical board...</div>";
        try {
            const res = await fetch(`${API}/predict`, {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify(matches[idx])
            });
            const d = await res.json();
            out.innerHTML = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:var(--draw); margin-bottom:5px;">
                    <span>${matches[idx].home} (Rank ${d.h_rank})</span>
                    <span>${matches[idx].away} (Rank ${d.a_rank})</span>
                </div>
                <div class="score">${d.score}</div>
                <div class="prob-bar">
                    <div class="prob-h" style="width:${d.probs.home}%"></div>
                    <div class="prob-d" style="width:${d.probs.draw}%"></div>
                    <div class="prob-a" style="width:${d.probs.away}%"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-top:8px; font-weight:bold;">
                    <span style="color:var(--neon)">HOME: ${d.probs.home}%</span>
                    <span style="color:var(--draw)">DRAW: ${d.probs.draw}%</span>
                    <span style="color:var(--away)">AWAY: ${d.probs.away}%</span>
                </div>
                <div class="gaffer-box">${d.insight}</div>
            </div>`;
        } catch(e) { out.innerHTML = "<div class='card'>Tactical error. Try again.</div>"; }
    }
</script>
</body>
</html>
