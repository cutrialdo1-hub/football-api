<!DOCTYPE html>
<html>
<head>
<title>Matchday Dashboard</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; padding:20px; }
.card { background:#1e293b; padding:15px; margin:10px 0; border-radius:10px; }
select, button { padding:10px; margin:5px; width:250px; }
button { background:#22c55e; color:white; border:none; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
</style>
</head>

<body>

<h1>⚽ Matchday Predictor</h1>

<div class="card">
    <select id="matchdays" onchange="loadMatches()"></select>
</div>

<div class="card">
    <select id="matches"></select>
    <button onclick="predict()">Predict</button>
</div>

<div id="output"></div>

<script>

const API = "https://football-api-9e4p.onrender.com";

let dataStore = {};

async function loadMatchdays() {
    const res = await fetch(API + "/fixtures");
    dataStore = await res.json();

    const select = document.getElementById("matchdays");
    select.innerHTML = "";

    Object.keys(dataStore).forEach(date => {
        let opt = document.createElement("option");
        opt.value = date;
        opt.textContent = date;
        select.appendChild(opt);
    });

    loadMatches();
}

function loadMatches() {
    const date = document.getElementById("matchdays").value;
    const matches = dataStore[date] || [];

    const select = document.getElementById("matches");
    select.innerHTML = "";

    matches.forEach((m, i) => {
        let opt = document.createElement("option");
        opt.value = i;
        opt.textContent = `${m.home} vs ${m.away}`;
        select.appendChild(opt);
    });
}

async function predict() {
    const date = document.getElementById("matchdays").value;
    const index = document.getElementById("matches").value;

    const match = dataStore[date][index];

    const res = await fetch(API + "/predict", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            home_team: match.home,
            away_team: match.away
        })
    });

    const data = await res.json();

    document.getElementById("output").innerHTML = `
    <div class="card">
        <h3>${data.home_team} vs ${data.away_team}</h3>
        <p>xG: ${data.expected_goals.home.toFixed(2)} - ${data.expected_goals.away.toFixed(2)}</p>
        <p>Home Win: ${(data.outcomes.home_win*100).toFixed(1)}%</p>
        <p>Draw: ${(data.outcomes.draw*100).toFixed(1)}%</p>
        <p>Away Win: ${(data.outcomes.away_win*100).toFixed(1)}%</p>
    </div>
    `;
}

loadMatchdays();

</script>

</body>
</html>
