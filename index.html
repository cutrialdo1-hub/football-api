<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Football Analyst Pro</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; text-align: center; }
        .card { background: #1e293b; padding: 20px; margin: 15px 0; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; box-sizing: border-box; }
        button { background: #22c55e; color: white; font-weight: bold; cursor: pointer; border: none; }
        .score-badge { font-size: 2.5em; font-weight: 900; color: #22c55e; margin: 10px 0; }
        .momentum { font-size: 0.75em; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .hot { background: #22c55e; } .cold { background: #ef4444; }
        .analysis { background: #334155; padding: 15px; border-radius: 10px; font-style: italic; border-left: 4px solid #22c55e; text-align: left; margin-top: 15px; }
        .bar { height: 10px; border-radius: 5px; display: flex; overflow: hidden; margin: 15px 0; background: #475569; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚽ AI Predictor</h1>
    <div class="card">
        <input type="date" id="date">
        <button onclick="loadMatches()">Find Fixtures</button>
    </div>
    <div class="card">
        <select id="matches"><option value="">Select Date First</option></select>
        <button onclick="predict()">Run Pro Analysis</button>
    </div>
    <div id="output"></div>
</div>

<script>
    const API = "https://football-api-9e4p.onrender.com";
    let matchesData = [];

    async function loadMatches() {
        const d = document.getElementById("date").value;
        const s = document.getElementById("matches");
        if(!d) return;
        s.innerHTML = "<option>Loading...</option>";
        const res = await fetch(`${API}/fixtures?date=${d}`);
        matchesData = await res.json();
        s.innerHTML = "<option value=''>-- Select Match --</option>";
        matchesData.forEach((m, i) => {
            let opt = document.createElement("option");
            opt.value = i;
            opt.textContent = `${m.home} vs ${m.away}`;
            s.appendChild(opt);
        });
    }

    async function predict() {
        const idx = document.getElementById("matches").value;
        const out = document.getElementById("output");
        if(idx === "") return;
        const m = matchesData[idx];
        out.innerHTML = "<div class='card'>Analyzing form and xG...</div>";

        const res = await fetch(`${API}/predict`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({home_id: m.home_id, away_id: m.away_id, competition: m.competition})
        });
        const d = await res.json();

        out.innerHTML = `
            <div class="card">
                <h3>${m.home} vs ${m.away}</h3>
                <div style="display:flex; justify-content:space-around; align-items:center">
                    <span class="momentum ${d.form.home >= 1 ? 'hot' : 'cold'}">Form: ${d.form.home}x</span>
                    <div class="score-badge">${d.prediction}</div>
                    <span class="momentum ${d.form.away >= 1 ? 'hot' : 'cold'}">Form: ${d.form.away}x</span>
                </div>
                <div class="bar">
                    <div style="width:${d.probs.home}%; background:#3b82f6"></div>
                    <div style="width:${d.probs.draw}%; background:#94a3b8"></div>
                    <div style="width:${d.probs.away}%; background:#ef4444"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.8em">
                    <span>Win: ${d.probs.home}%</span>
                    <span>Draw: ${d.probs.draw}%</span>
                    <span>Loss: ${d.probs.away}%</span>
                </div>
                <div class="analysis"><strong>AI Insight:</strong> ${d.analysis}</div>
                <p style="font-size:0.7em; color:#64748b; margin-top:10px">xG Projection: ${d.xg.home} - ${d.xg.away}</p>
            </div>
        `;
    }
</script>
</body>
</html>
