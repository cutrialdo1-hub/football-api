<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Gaffer</title>

<style>
body { background:#0a0b10; color:white; font-family:Arial; text-align:center; }
.card { background:#151821; padding:20px; margin:20px auto; width:320px; border-radius:10px; }
button { padding:10px; margin:10px; background:#00ff9d; border:none; cursor:pointer; }
select,input { padding:10px; width:250px; margin:5px; }
</style>
</head>

<body>

<h1>THE GAFFER</h1>

<input type="date" id="date">
<button onclick="getFixtures()">Load Matches</button>

<br><br>

<select id="matches">
<option value="">Select match</option>
</select>

<br>

<button onclick="predict()">Predict</button>

<div id="output"></div>

<script>
const API = "https://football-api-9e4p.onrender.com";

let matches = [];

async function getFixtures() {
    const d = document.getElementById("date").value;
    const sel = document.getElementById("matches");

    if (!d) return;

    sel.innerHTML = "<option>Loading...</option>";

    try {
        const res = await fetch(`${API}/fixtures?date=${d}`);
        matches = await res.json();

        sel.innerHTML = "<option value=''>Select match</option>";

        matches.forEach((m, i) => {
            const opt = document.createElement("option");
            opt.value = i;
            opt.textContent = `[${m.league}] ${m.home} vs ${m.away}`;
            sel.appendChild(opt);
        });

    } catch (e) {
        sel.innerHTML = "<option>Error loading</option>";
    }
}

async function predict() {
    const idx = document.getElementById("matches").value;
    const match = matches[idx];

    if (!match) return;

    const out = document.getElementById("output");
    out.innerHTML = "Loading...";

    const res = await fetch(`${API}/predict`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(match)
    });

    const d = await res.json();

    out.innerHTML = `
    <div class="card">
        <h3>${match.home} vs ${match.away}</h3>
        <p>Score: ${d.score}</p>
        <p>Home: ${d.probs.home}%</p>
        <p>Draw: ${d.probs.draw}%</p>
        <p>Away: ${d.probs.away}%</p>
    </div>
    `;
}
</script>

</body>
</html>
