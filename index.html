<script>

const API = "https://football-api-9e4p.onrender.com";

// -----------------------------
// LOAD TEAMS
// -----------------------------
async function loadTeams() {
    try {
        const res = await fetch(API + "/teams");
        const teams = await res.json();

        const homeSelect = document.getElementById("home");
        const awaySelect = document.getElementById("away");

        homeSelect.innerHTML = "";
        awaySelect.innerHTML = "";

        teams.forEach(team => {
            const opt1 = document.createElement("option");
            opt1.value = team;
            opt1.textContent = team;

            const opt2 = document.createElement("option");
            opt2.value = team;
            opt2.textContent = team;

            homeSelect.appendChild(opt1);
            awaySelect.appendChild(opt2);
        });

    } catch (err) {
        console.error("Teams failed to load:", err);
    }
}

// -----------------------------
// PREDICT
// -----------------------------
async function predict() {

    const home = document.getElementById("home").value;
    const away = document.getElementById("away").value;

    try {
        const res = await fetch(API + "/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                home_team: home,
                away_team: away
            })
        });

        const data = await res.json();

        if (!res.ok) {
            document.getElementById("output").innerHTML =
                `<div class="card">❌ ${data.error || "Prediction failed"}</div>`;
            return;
        }

        let html = "";

        // xG
        html += `
        <div class="card">
            <div class="big">Expected Goals</div>
            <p>${data.home_team}: ${data.expected_goals.home.toFixed(2)}</p>
            <p>${data.away_team}: ${data.expected_goals.away.toFixed(2)}</p>
        </div>
        `;

        // outcomes
        html += `
        <div class="card">
            <div class="big">Match Outcome Probabilities</div>
            <p>Home Win: ${(data.outcomes.home_win * 100).toFixed(1)}%</p>
            <p>Draw: ${(data.outcomes.draw * 100).toFixed(1)}%</p>
            <p>Away Win: ${(data.outcomes.away_win * 100).toFixed(1)}%</p>
        </div>
        `;

        document.getElementById("output").innerHTML = html;

    } catch (err) {
        console.error(err);
        document.getElementById("output").innerHTML =
            `<div class="card">❌ Prediction failed (network error)</div>`;
    }
}

// INIT
loadTeams();

</script>
